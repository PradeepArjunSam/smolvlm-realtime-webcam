<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmolVLM Realtime Webcam</title>
    <meta name="description" content="Real-time webcam feed analysis using SmolVLM and llama.cpp, Ollama, or vLLM backends.">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
            padding: 20px;
            background-color: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
        }

        h1 {
            font-size: 1.6rem;
            color: #a0c4ff;
            text-align: center;
            letter-spacing: 0.5px;
        }

        h1 span {
            color: #7b8cde;
            font-size: 0.9rem;
            display: block;
            font-weight: normal;
            margin-top: 2px;
        }

        .main-layout {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 1100px;
        }

        .video-panel {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        #videoFeed {
            width: 480px;
            height: 360px;
            border: 2px solid #3a3a6e;
            background-color: #000;
            border-radius: 10px;
            transform: scaleX(-1);
            display: block;
        }

        .video-meta {
            display: flex;
            gap: 16px;
            font-size: 0.78rem;
            color: #888;
            width: 100%;
            justify-content: space-between;
            padding: 0 4px;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.72rem;
            font-weight: 600;
        }

        .badge.connected { background: #1a3a1a; color: #4caf50; }
        .badge.disconnected { background: #3a1a1a; color: #f44336; }
        .badge.processing { background: #1a2a3a; color: #2196f3; }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: currentColor;
        }

        .settings-panel {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #16213e;
            padding: 18px;
            border-radius: 10px;
            border: 1px solid #2a2a5e;
            min-width: 320px;
            flex: 1;
            max-width: 480px;
        }

        .settings-panel h2 {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7b8cde;
            margin-bottom: 4px;
            border-bottom: 1px solid #2a2a5e;
            padding-bottom: 8px;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-weight: 600;
            font-size: 0.82rem;
            color: #aaa;
        }

        input[type="text"], input[type="number"], select, textarea {
            background: #0f0f23;
            color: #ddd;
            border: 1px solid #3a3a6e;
            border-radius: 6px;
            padding: 8px 10px;
            font-size: 0.88rem;
            font-family: inherit;
            width: 100%;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="number"]:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #7b8cde;
        }

        textarea {
            resize: vertical;
            min-height: 60px;
        }

        #responseText {
            min-height: 90px;
            color: #a0c4ff;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        select {
            flex: 1;
        }

        #startButton {
            padding: 10px 24px;
            font-size: 1rem;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: 700;
            transition: background-color 0.2s, transform 0.1s;
            min-width: 90px;
        }

        #startButton:active { transform: scale(0.97); }
        #startButton.start { background-color: #2e7d32; }
        #startButton.start:hover { background-color: #388e3c; }
        #startButton.stop { background-color: #c62828; }
        #startButton.stop:hover { background-color: #d32f2f; }

        .hidden { display: none; }

        .error-msg {
            font-size: 0.8rem;
            color: #f44336;
            padding: 6px 10px;
            background: #2a0a0a;
            border-radius: 6px;
            border-left: 3px solid #f44336;
        }

        .info-msg {
            font-size: 0.8rem;
            color: #aaa;
            padding: 4px 0;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .row > * { flex: 1; }

        footer {
            font-size: 0.75rem;
            color: #555;
            margin-top: 8px;
        }

        footer a { color: #7b8cde; text-decoration: none; }
    </style>
</head>

<body>

    <h1>SmolVLM Realtime Webcam
        <span>Real-time vision AI • llama.cpp / Ollama / vLLM</span>
    </h1>

    <div class="main-layout">

        <!-- VIDEO PANEL -->
        <div class="video-panel">
            <video id="videoFeed" autoplay playsinline></video>
            <canvas id="canvas" class="hidden"></canvas>
            <div class="video-meta">
                <span id="statusBadge" class="badge disconnected"><span class="dot"></span>Camera off</span>
                <span id="fpsBadge" class="info-msg">FPS: —</span>
                <span id="reqBadge" class="info-msg">Requests: 0</span>
            </div>
        </div>

        <!-- SETTINGS PANEL -->
        <div class="settings-panel">
            <h2>Configuration</h2>

            <!-- Backend selector -->
            <div class="field-group">
                <label for="backendSelect">Backend</label>
                <select id="backendSelect">
                    <option value="llamacpp">llama.cpp (default)</option>
                    <option value="ollama">Ollama</option>
                    <option value="vllm">vLLM</option>
                    <option value="custom">Custom / OpenAI-compatible</option>
                </select>
            </div>

            <!-- Base URL + model -->
            <div class="row">
                <div class="field-group">
                    <label for="baseURL">Base API URL</label>
                    <input type="text" id="baseURL" value="http://localhost:8080" autocomplete="off">
                </div>
                <div class="field-group" id="modelGroup">
                    <label for="modelName">Model (Ollama/vLLM)</label>
                    <input type="text" id="modelName" value="smolvlm" placeholder="e.g. smolvlm">
                </div>
            </div>

            <!-- Camera selector -->
            <div class="field-group">
                <label for="cameraSelect">Camera</label>
                <select id="cameraSelect">
                    <option value="">Loading cameras…</option>
                </select>
            </div>

            <!-- Instruction -->
            <div class="field-group">
                <label for="instructionText">Instruction
                    <span class="info-msg" style="font-weight:normal"> — wrap output in {} for JSON mode</span>
                </label>
                <textarea id="instructionText" rows="3"></textarea>
            </div>

            <!-- Response -->
            <div class="field-group">
                <label for="responseText">Response</label>
                <textarea id="responseText" readonly placeholder="AI response will appear here…"></textarea>
            </div>

            <!-- Controls row -->
            <div class="controls-row">
                <div class="field-group" style="flex:1">
                    <label for="intervalSelect">Interval</label>
                    <select id="intervalSelect">
                        <option value="100">100 ms</option>
                        <option value="250">250 ms</option>
                        <option value="500" selected>500 ms</option>
                        <option value="1000">1 s</option>
                        <option value="2000">2 s</option>
                        <option value="5000">5 s</option>
                    </select>
                </div>
                <div class="field-group" style="flex:1">
                    <label for="maxTokens">Max tokens</label>
                    <input type="number" id="maxTokens" value="150" min="10" max="2000">
                </div>
                <button id="startButton" class="start">Start</button>
            </div>

            <div id="errorMsg" class="error-msg hidden"></div>
        </div>
    </div>

    <footer>
        Fork of <a href="https://github.com/ngxson/smolvlm-realtime-webcam" target="_blank">ngxson/smolvlm-realtime-webcam</a> ·
        <a href="https://github.com/PradeepArjunSam/smolvlm-realtime-webcam" target="_blank">PradeepArjunSam/smolvlm-realtime-webcam</a>
    </footer>

    <script>
        // ── DOM refs ──────────────────────────────────────────────────────────
        const video          = document.getElementById('videoFeed');
        const canvas         = document.getElementById('canvas');
        const baseURL        = document.getElementById('baseURL');
        const modelName      = document.getElementById('modelName');
        const backendSelect  = document.getElementById('backendSelect');
        const cameraSelect   = document.getElementById('cameraSelect');
        const instructionText= document.getElementById('instructionText');
        const responseText   = document.getElementById('responseText');
        const intervalSelect = document.getElementById('intervalSelect');
        const maxTokens      = document.getElementById('maxTokens');
        const startButton    = document.getElementById('startButton');
        const statusBadge    = document.getElementById('statusBadge');
        const fpsBadge       = document.getElementById('fpsBadge');
        const reqBadge       = document.getElementById('reqBadge');
        const errorMsg       = document.getElementById('errorMsg');
        const modelGroup     = document.getElementById('modelGroup');

        // ── State ─────────────────────────────────────────────────────────────
        let stream        = null;
        let intervalId    = null;
        let isProcessing  = false;
        let abortController = null;   // FIX #2: cancel in-flight requests
        let requestCount  = 0;
        let lastFrameTime = 0;

        // ── Defaults ──────────────────────────────────────────────────────────
        instructionText.value = '<image>\nDescribe what you see in this image in detail. Focus on objects, people, and actions.';

        // ── Backend selector logic (FIX #3: Ollama / vLLM support) ───────────
        const backendDefaults = {
            llamacpp: { url: 'http://localhost:8080', model: '' },
            ollama:   { url: 'http://localhost:11434', model: 'smolvlm' },
            vllm:     { url: 'http://localhost:8000', model: 'HuggingFaceTB/SmolVLM-500M-Instruct' },
            custom:   { url: 'http://localhost:8080', model: '' },
        };

        backendSelect.addEventListener('change', () => {
            const preset = backendDefaults[backendSelect.value];
            baseURL.value   = preset.url;
            modelName.value = preset.model;
            // Show model field only for backends that need it
            modelGroup.style.display = (backendSelect.value === 'llamacpp') ? 'none' : 'flex';
            modelGroup.style.flexDirection = 'column';
            modelGroup.style.gap = '5px';
        });
        // Hide model field initially (llama.cpp doesn't need it)
        modelGroup.style.display = 'none';

        // ── Camera enumeration ────────────────────────────────────────────────
        async function enumerateCameras() {
            try {
                // Need a temporary permission grant first
                const tmpStream = await navigator.mediaDevices.getUserMedia({ video: true });
                tmpStream.getTracks().forEach(t => t.stop());

                const devices = await navigator.mediaDevices.enumerateDevices();
                const cameras = devices.filter(d => d.kind === 'videoinput');
                cameraSelect.innerHTML = '';
                cameras.forEach((cam, i) => {
                    const opt = document.createElement('option');
                    opt.value = cam.deviceId;
                    opt.textContent = cam.label || `Camera ${i + 1}`;
                    cameraSelect.appendChild(opt);
                });
                if (cameras.length === 0) {
                    cameraSelect.innerHTML = '<option value="">No cameras found</option>';
                }
            } catch (err) {
                cameraSelect.innerHTML = '<option value="">Permission denied</option>';
                showError('Camera permission denied: ' + err.message);
            }
        }

        // ── Camera init ───────────────────────────────────────────────────────
        async function initCamera(deviceId) {
            if (stream) {
                stream.getTracks().forEach(t => t.stop());
                stream = null;
            }
            try {
                const constraints = {
                    video: deviceId ? { deviceId: { exact: deviceId } } : true,
                    audio: false
                };
                stream = await navigator.mediaDevices.getUserMedia(constraints);
                video.srcObject = stream;
                setStatus('connected', 'Camera ready');
                hideError();
            } catch (err) {
                showError(`Camera error: ${err.name} – ${err.message}. Use HTTPS or localhost.`);
                setStatus('disconnected', 'Camera error');
            }
        }

        cameraSelect.addEventListener('change', () => {
            if (cameraSelect.value) initCamera(cameraSelect.value);
        });

        // ── Chat request (FIX #1, #2, #3, #4) ───────────────────────────────
        async function sendChatCompletionRequest(instruction, imageBase64URL, signal) {
            const backend = backendSelect.value;
            const url     = `${baseURL.value.replace(/\/$/, '')}/v1/chat/completions`;
            const tokens  = parseInt(maxTokens.value, 10) || 150;

            // FIX #4: Detect JSON mode from instruction
            const wantsJSON = /[{}\[\]]/.test(instruction) || /json/i.test(instruction);
            const body = {
                max_tokens: tokens,
                messages: [{
                    role: 'user',
                    content: [
                        { type: 'text', text: instruction },
                        { type: 'image_url', image_url: { url: imageBase64URL } }
                    ]
                }]
            };

            // Add model for Ollama/vLLM
            if (backend !== 'llamacpp' && modelName.value.trim()) {
                body.model = modelName.value.trim();
            }

            // Add response_format for JSON mode
            if (wantsJSON) {
                body.response_format = { type: 'json_object' };
            }

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
                signal  // FIX #2: support AbortController
            });

            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`Server ${response.status}: ${errText.slice(0, 120)}`);
            }

            const data = await response.json();
            if (!data.choices || data.choices.length === 0) {
                throw new Error('Empty choices in response');
            }
            return data.choices[0].message.content;
        }

        // ── Capture frame ─────────────────────────────────────────────────────
        function captureImage() {
            if (!stream || !video.videoWidth) return null;
            canvas.width  = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            return canvas.toDataURL('image/jpeg', 0.8);
        }

        // ── Send data loop ────────────────────────────────────────────────────
        async function sendData() {
            if (!isProcessing) return;

            // FIX #2: Cancel any previous in-flight request
            if (abortController) abortController.abort();
            abortController = new AbortController();

            const imageBase64URL = captureImage();
            if (!imageBase64URL) {
                responseText.value = 'Failed to capture frame.';
                return;
            }

            const now = Date.now();
            if (lastFrameTime) {
                const fps = Math.round(1000 / (now - lastFrameTime));
                fpsBadge.textContent = `FPS: ${fps}`;
            }
            lastFrameTime = now;

            setStatus('processing', 'Processing…');

            try {
                const result = await sendChatCompletionRequest(
                    instructionText.value,
                    imageBase64URL,
                    abortController.signal
                );
                responseText.value = result;
                requestCount++;
                reqBadge.textContent = `Requests: ${requestCount}`;
                hideError();
                setStatus('connected', 'Running');
            } catch (err) {
                if (err.name === 'AbortError') return; // Expected cancel
                showError(err.message);
                setStatus('connected', 'Error – retrying…');
            }
        }

        // ── Start / Stop ──────────────────────────────────────────────────────
        function handleStart() {
            if (!stream) {
                showError('Camera not available. Please grant permission first.');
                return;
            }
            isProcessing  = true;
            requestCount  = 0;
            lastFrameTime = 0;
            startButton.textContent = 'Stop';
            startButton.classList.replace('start', 'stop');
            instructionText.disabled = true;
            intervalSelect.disabled  = true;
            backendSelect.disabled   = true;
            setStatus('processing', 'Starting…');

            sendData();
            intervalId = setInterval(sendData, parseInt(intervalSelect.value, 10));
        }

        function handleStop() {
            isProcessing = false;
            if (abortController) { abortController.abort(); abortController = null; }
            if (intervalId)      { clearInterval(intervalId); intervalId = null; }
            startButton.textContent = 'Start';
            startButton.classList.replace('stop', 'start');
            instructionText.disabled = false;
            intervalSelect.disabled  = false;
            backendSelect.disabled   = false;
            fpsBadge.textContent     = 'FPS: —';
            setStatus('connected', 'Camera ready');
        }

        startButton.addEventListener('click', () => {
            isProcessing ? handleStop() : handleStart();
        });

        // ── UI helpers ────────────────────────────────────────────────────────
        function setStatus(type, text) {
            statusBadge.className = `badge ${type}`;
            statusBadge.innerHTML = `<span class="dot"></span>${text}`;
        }

        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            errorMsg.classList.add('hidden');
        }

        // ── Init ──────────────────────────────────────────────────────────────
        window.addEventListener('DOMContentLoaded', async () => {
            await enumerateCameras();
            await initCamera(cameraSelect.value || null);
        });

        window.addEventListener('beforeunload', () => {
            if (stream)     stream.getTracks().forEach(t => t.stop());
            if (intervalId) clearInterval(intervalId);
            if (abortController) abortController.abort();
        });
    </script>
</body>

</html>
